<!DOCTYPE html>
<!--wilson-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audubon Community Advocates | Fix the Funding Formula</title>
    <style>
        :root {
            --audubon-green: #046A38;
            --audubon-gold: #FFCD00;
            --dark-gray: #2d3748;
            --light-bg: #f7fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: var(--light-bg); color: var(--dark-gray); line-height: 1.6; }

        header { background-color: var(--audubon-green); border-bottom: 5px solid var(--audubon-gold); color: white; padding: 2rem 1rem; text-align: center; }
        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        .landing-content, .form-card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 2rem; }
        h2 { color: var(--audubon-green); margin-bottom: 1rem; }
        .form-group { margin-bottom: 1.25rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        input, textarea { width: 100%; padding: 0.75rem; border: 1px solid #cbd5e0; border-radius: 4px; }
        textarea { height: 300px; }
        button { background-color: var(--audubon-green); color: white; border: none; padding: 1rem; font-weight: bold; border-radius: 4px; cursor: pointer; width: 100%; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body>

    <header>
        <h1>Audubon Community Advocates</h1>
        <p>Standing up for our local schools, educators, and taxpayers.</p>
    </header>

    <div class="container">
        <section class="landing-content">
            <h2>Tell Trenton: Fix the Formula.</h2>
            <p>Our school funding formula is broken, relying on a flawed multiplier that makes local budgeting unpredictable. It’s time to fully fund our schools based on actual student need.</p>
        </section>

        <section class="form-card">
            <form id="advocacyForm">
                <div class="form-group">
                    <label>Your Full Name *</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label>Your Email Address *</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Your Phone Number *</label>
                    <input type="tel" id="phone" required>
                </div>
                <div class="form-group">
                    <label>Message *</label>
                    <textarea id="message" required>Dear Senator Cruz-Pérez, Assemblyman Moen, and Assemblyman Spearman,

As a resident of Audubon, I am writing to urge you to pass legislation that will permanently fix New Jersey's school funding formula.

The current formula relies on a flawed wealth multiplier that makes annual school budgeting unpredictable. Our district is forced to cut the educators who serve our children while local property taxpayers are put on the hook to make up the difference.

I am asking you to abolish the multiplier and simply fund our school districts fairly and fully based on actual student need.

I look forward to hearing how you plan to address this critical issue in the legislature.</textarea>
                </div>
                <div class="form-group">
                    <input type="checkbox" id="mailingList">
                    <label style="display:inline;" for="mailingList">Subscribe to updates</label>
                </div>
                <button type="submit" id="submitBtn">Send Email to Legislators</button>
            </form>
        </section>
    </div>

    <script>
        // Make sure this URL is your active "Web App" deployment URL ending in /exec
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzMj8lkhUJLyw1R1qovpARiJPPinufWepVmPsQpBlackelQELLlkiMIFvRrR2z6CqG6lg/exec";

        document.getElementById("advocacyForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            const btn = document.getElementById("submitBtn");
            btn.textContent = "Sending...";
            btn.disabled = true;

            const payload = {
                name: document.getElementById("name").value,
                email: document.getElementById("email").value,
                phone: document.getElementById("phone").value,
                message: document.getElementById("message").value,
                optIn: document.getElementById("mailingList").checked
            };

            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                btn.textContent = "Message Sent!";
                btn.style.backgroundColor = "#28a745";
            } catch (err) {
                btn.textContent = "Error. Try again.";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
